<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Belajar Pintar</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

#login,#register,#home,#quiz{
padding:20px;
max-width:800px;
margin:0 auto;
}

input,button,select,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:0.9;
}

.video-box{
height:250px;
background:black;
overflow:hidden;
border-radius:15px;
margin-bottom:20px;
}

.video-box video{
width:100%;
height:100%;
object-fit:cover;
}

.hidden{
display:none;
}

.soal{
background:white;
padding:18px;
margin-top:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.pilihan-jawaban{
margin-top:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.pilihan{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
cursor:pointer;
transition:all 0.3s;
}

.pilihan:hover{
background:#e8f5e9;
}

.pilihan.benar{
background:#c8e6c9;
border-color:#4CAF50;
font-weight:bold;
}

.pilihan.salah{
background:#ffcdd2;
border-color:#f44336;
}

#menu{
margin-top:15px;
padding:20px;
background:#e9e9e9;
border-radius:15px;
}

h2{
color:#333;
text-align:center;
margin-bottom:20px;
}

#login p, #register p{
text-align:center;
margin:5px 0;
color:#666;
}

.switch-form{
text-align:center;
margin-top:15px;
color:#4CAF50;
cursor:pointer;
}

.switch-form:hover{
text-decoration:underline;
}

#skorContainer{
text-align:center;
font-size:18px;
font-weight:bold;
margin:15px 0;
color:#333;
}

#riwayatContainer{
background:#e8f5e9;
padding:15px;
border-radius:10px;
text-align:center;
margin-bottom:15px;
}

#mapelEditSection{
background:#fff3e0;
padding:15px;
border-radius:10px;
margin-top:15px;
}

.admin-label{
color:#f57c00;
font-weight:bold;
}

#gcButton{
background:#25D366;
margin-top:10px;
}
</style>
</head>
<body>

<!-- Halaman Login -->
<div id="login">
<h2>Masuk ke Akun</h2>
<input id="loginUser" placeholder="Username kamu" required>
<input id="loginPass" type="password" placeholder="Password kamu" required>
<button onclick="login()">Masuk</button>
<p class="switch-form" onclick="showRegister()">Belum punya akun? Daftar di sini</p>
</div>

<!-- Halaman Daftar -->
<div id="register" class="hidden">
<h2>Daftar Akun Baru</h2>
<input id="regUser" placeholder="Pilih Username" required>
<input id="regPass" type="password" placeholder="Pilih Password" required>
<button onclick="register()">Daftar Sekarang</button>
<p class="switch-form" onclick="showLogin()">Sudah punya akun? Masuk di sini</p>
</div>

<!-- Halaman Utama -->
<div id="home" class="hidden">
<div class="video-box">
<video autoplay muted loop>
<source src="anime.mp4" type="video/mp4">
<p>Browser kamu tidak mendukung video.</p>
</video>
</div>

<h2>Halo, <span id="userName"></span>! 📚</h2>

<!-- Tombol Utama -->
<button onclick="copyNomor()">Copy Nomor Admin</button>
<button onclick="bukaMenu()">>>> Buka Menu Quiz <<<</button>
<button id="gcButton" onclick="bukaGC()">Buka Grup Belajar</button>
<button onclick="logout()">Keluar dari Akun</button>

<!-- Riwayat Permainan -->
<div id="riwayatContainer" class="hidden">
<p><b>Riwayat Permainan Sebelumnya</b></p>
<p>Mapel: <span id="riwayatMapel"></span></p>
<p>Sudah Jawab: <span id="riwayatJumlah"></span> dari <span id="riwayatTotal"></span> Soal</p>
<p>Skor Saat Ini: <span id="riwayatSkor"></span></p>
<button onclick="lanjutkanQuiz()">Lanjutkan Permainan</button>
<button onclick="hapusRiwayat()">Hapus Riwayat & Mulai Baru</button>
</div>

<!-- Menu Quiz -->
<div id="menu" class="hidden">
<select id="mapel" required>
<option value="">-- Pilih Mata Pelajaran --</option>
<option value="MTK">MTK</option>
<option value="IPAS">IPAS</option>
<option value="BINDO">Bahasa Indonesia</option>
<option value="SENI">Seni Budaya</option>
<option value="BINGGRIS">Bahasa Inggris</option>
<option value="LAINNYA">Pengetahuan Umum</option>
</select>

<input type="number" id="jumlah" placeholder="Jumlah Soal (Max 100)" min="1" max="100" value="5" required>

<button onclick="mulaiQuiz()">Mulai Kerjakan Soal</button>
<button onclick="resetForm()">Reset Pilihan</button>
</div>

<!-- Bagian Edit Nama Mapel (Bisa Kamu Edit Sendiri) -->
<div id="mapelEditSection" class="hidden">
<p class="admin-label">EDIT NAMA MATA PELAJARAN (Isi kolom di bawah untuk ganti nama)</p>
<textarea id="mapelNamaCustom" rows="3" placeholder="Contoh:
MTK=Matematika Kelas 7
IPAS=Ilmu Pengetahuan Alam & Sosial"></textarea>
<button onclick="simpanNamaMapel()">Simpan Nama Mapel</button>
<button onclick="resetNamaMapel()">Kembalikan Nama Default</button>
</div>
</div>

<!-- Halaman Quiz -->
<div id="quiz" class="hidden">
<h2>Soal <span id="mapelNama"></span></h2>
<div id="skorContainer">Skor: <span id="skor">0</span> / <span id="totalSoal">0</span></div>
<button onclick="simpanRiwayatDanKembali()">Simpan & Kembali ke Utama</button>
<div id="soalContainer"></div>
<div id="hasilAkhir" class="hidden">
<h3>HASIL AKHIR!</h3>
<p id="pesanHasil"></p>
<button onclick="kembaliHomeSetelahHasil()">Kembali ke Utama</button>
</div>
</div>

// Variabel Global

skor: 0,
mapelSekarang: "",
jumlahSoalSekarang: 0

// Fungsi Tampilkan Login/Daftar
function showLogin(){
document.getElementById("register").classList.add("hidden");
document.getElementById("login").classList.remove("hidden");
}

function showRegister(){
document.getElementById("login").classList.add("hidden");

}

// Fungsi Daftar Akun
function register(){
const regUser = document.getElementById("regUser").value.trim();
const regPass = document.getElementById("regPass").value.trim();

if(!regUser || !regPass){
alert("Username dan password tidak boleh kosong!");
return;
}

let users = JSON.parse(localStorage.getItem("users")) || [];
const userExist = users.some(user => user.username === regUser);

if(userExist){
alert("Username sudah dipakai! Pilih yang lain ya.");
return;
}

users.push({username: regUser, password: regPass});
localStorage.setItem("users", JSON.stringify(users));
alert("Akun berhasil dibuat! Silakan masuk.");
showLogin();
}

// Fungsi Login
function login(){
const loginUser = document.getElementById("loginUser").value.trim();
const loginPass = document.getElementById("loginPass").value.trim();

let users = JSON.parse(localStorage.getItem("users")) || [];
const userFound = users.find(user => user.username === loginUser && user.password === loginPass);

// Cek Admin
if(loginUser === "admintolls" && loginPass === "10102020"){
userData.activeUser = loginUser;
userData.isAdmin = true;
document.getElementById("mapelEditSection").classList.remove("hidden");
alert("Selamat datang Admin! Jawaban akan muncul otomatis setiap 3 detik.");
}else if(userFound){
userData.activeUser = loginUser;
userData.isAdmin = false;
alert(`Selamat datang ${loginUser}! Mari belajar bareng.`);
}else{
alert("Username/password salah atau belum terdaftar!");
return;
}

// Simpan user aktif
localStorage.setItem("activeUser", JSON.stringify({
username: userData.activeUser,
isAdmin: userData.isAdmin,
loginTime: Date.now()
}));

// Tampilkan nama user
document.getElementById("userName").textContent = userData.activeUser;

// Cek riwayat permainan
cekRiwayat();

// Pindah ke halaman utama
document.getElementById("login").classList.add("hidden");
document.getElementById("home").classList.remove("hidden");
}

// Fungsi Cek Riwayat
function cekRiwayat(){
const riwayat = JSON.parse(localStorage.getItem(`riwayat_${userData.activeUser}`));

userData.riwayat = riwayat;

}else{

}

function hapusRiwayat(){

// Fungsi Simpan Riwayat

// Fungsi Ambil Nama Mapel (Custom atau Default)
function getNamaMapel(kodeMapel){
const customMapel = JSON.parse(localStorage.getItem("customMapel")) || {};
return customMapel[kodeMapel] || document.getElementById("mapel").options.namedItem(kodeMapel).text;
}

// Fungsi Simpan Nama Mapel Custom
function simpanNamaMapel(){
const text = document.getElementById("mapelNamaCustom").value.trim();
const customMapel = {};

if(text){
const baris = text.split("\n");
baris.forEach(baris => {
const parts = baris.split("=");
if(parts.length === 2){
const kode = parts[0].trim();
const nama = parts[1].trim();
if(soalData[kode]) customMapel[kode] = nama;
}
});
}

localStorage.setItem("customMapel", JSON.stringify(customMapel));
alert("Nama mapel berhasil disimpan!");
// Update opsi mapel
updateOpsiMapel();
}

// Fungsi Reset Nama Mapel
function resetNamaMapel(){
localStorage.removeItem("customMapel");
document.getElementById("mapelNamaCustom").value = "";
alert("Nama mapel kembali ke default!");
updateOpsiMapel();
}

// Fungsi Update Opsi Mapel
function updateOpsiMapel(){
const customMapel = JSON.parse(localStorage.getItem("customMapel")) || {};
const select = document.getElementById("mapel");

for(let i = 1; i < select.options.length; i++){
const kode = select.options[i].value;
select.options[i].text = customMapel[kode] || select.options[i].text;
}
}

// Fungsi Mulai Quiz Baru
function mulaiQuiz(){
const mapel = document.getElementById("mapel").value;
let jumlah = parseInt(document.getElementById("jumlah").value);

if(!mapel){
alert("Pilih mata pelajaran dulu ya!");
return;
}
if(isNaN(jumlah) || jumlah < 1){
alert("Jumlah soal minimal 1!");
document.getElementById("jumlah").value = 5;
return;
}
if(jumlah > 100) jumlah = 100;

// Reset data quiz
userData.mapelSekarang = mapel;
userData.jumlahSoalSekarang = Math.min(jumlah, soalData[mapel].length);
userData.soalTerpilih = [];
userData.jawabanUser = [];
userData.skor = 0;

// Ambil soal random tanpa duplikat
const arrSoal = soalData[mapel];
while(userData.soalTerpilih.length < userData.jumlahSoalSekarang){
const randomIndex = Math.floor(Math.random() * arrSoal.length);
if(!userData.soalTerpilih.includes(arrSoal[randomIndex])){
userData.soalTerpilih.push(arrSoal[randomIndex]);
}
}

// Tampilkan nama mapel
const mapelNama = getNamaMapel(mapel);
document.getElementById("mapelNama").textContent = mapelNama;
document.getElementById("skor").textContent = 0;
document.getElementById("totalSoal").textContent = userData.jumlahSoalSekarang;

// Pindah ke halaman quiz
document.getElementById("home").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
tampilkanSoal();

// Hapus riwayat lama karena mulai baru
localStorage.removeItem(`riwayat_${userData.activeUser}`);
document.getElementById("riwayatContainer").classList.add("hidden");
}

// Fungsi Tampilkan Soal
function tampilkanSoal(){
const container = document.getElementById("soalContainer");
container.innerHTML = "";

userData.soalTerpilih.forEach((item, index) => {
const divSoal = document.createElement("div");
divSoal.className = "soal";
divSoal.innerHTML = `
<p><b>${index+1}. ${item.soal}</b></p>
<div class="pilihan-jawaban" id="pilihan-${index}">
${item.pilihan.map((p, i) => `
<div class="pilihan" onclick="pilihJawaban(${index}, ${i})" id="pilihan-${index}-${i}">
${String.fromCharCode(65 + i)}. ${p}
</div>
`).join("")}
</div>
`;
container.appendChild(divSoal);

// Jika sudah ada jawaban, tandai
if(userData.jawabanUser[index] !== undefined){
const pilihan = document.getElementById(`pilihan-${index}-${userData.jawabanUser[index]}`);
pilihan.classList.add(userData.jawabanUser[index] === item.benar ? "benar" : "salah");
}

// Jika admin, tampilkan jawaban benar setelah 3 detik
if(userData.isAdmin){
setTimeout(() => {
const pilihanBenar = document.getElementById(`pilihan-${index}-${item.benar}`);
pilihanBenar.classList.add("benar");
}, 3000 * (index + 1));
}
});
}

// Fungsi Pilih Jawaban
function pilihJawaban(indexSoal, indexPilihan){
// Jika sudah pernah menjawab, tidak bisa ganti
if(userData.jawabanUser[indexSoal] !== undefined) return;

const itemSoal = userData.soalTerpilih[indexSoal];
userData.jawabanUser[indexSoal] = indexPilihan;

// Tandai jawaban
const pilihan = document.getElementById(`pilihan-${indexSoal}-${indexPilihan}`);
if(indexPilihan === itemSoal.benar){
pilihan.classList.add("benar");
userData.skor++;
}else{
pilihan.classList.add("salah");
// Tampilkan jawaban benar jika bukan admin
if(!userData.isAdmin){
const pilihanBenar = document.getElementById(`pilihan-${indexSoal}-${itemSoal.benar}`);
pilihanBenar.classList.add("benar");
}
}

// Update skor
document.getElementById("skor").textContent = userData.skor;

// Simpan riwayat setiap kali menjawab
simpanRiwayat();

// Cek apakah semua soal sudah dijawab
if(userData.jawabanUser.length === userData.jumlahSoalSekarang){
tampilkanHasilAkhir();
}
}

// Fungsi Tampilkan Hasil Akhir
function tampilkanHasilAkhir(){
document.getElementById("soalContainer").classList.add("hidden");
document.getElementById("hasilAkhir").classList.remove("hidden");

let pesan = "";
if(userData.skor === userData.jumlahSoalSekarang){
pesan = `SELAMAT YA! Kamu menjawab semua soal BENAR (${userData.skor}/${userData.jumlahSoalSekarang}). Kamu sangat pintar!`;
}else{
pesan = `Hasil akhir kamu: ${userData.skor}/${userData.jumlahSoalSekarang}. Jangan kecewa ya, materi memang lumayan susah, tapi kamu bisa coba lagi untuk lebih baik!`;
}
document.getElementById("pesanHasil").textContent = pesan;

// Hapus riwayat karena sudah selesai
localStorage.removeItem(`riwayat_${userData.activeUser}`);
}
