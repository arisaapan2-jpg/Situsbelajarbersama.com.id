<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Belajar Pintar</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

#login,#register,#home,#quiz{
padding:20px;
max-width:800px;
margin:0 auto;
}

input,button,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:0.9;
}

.video-box{
height:250px;
background:black;
overflow:hidden;
border-radius:15px;
margin-bottom:20px;
}

.video-box video{
width:100%;
height:100%;
object-fit:cover;
}

.hidden{
display:none;
}

.soal{
background:white;
padding:18px;
margin-top:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

#menu{
margin-top:15px;
padding:20px;
background:#e9e9e9;
border-radius:15px;
}

h2{
color:#333;
text-align:center;
margin-bottom:20px;
}

#login p, #register p{
text-align:center;
margin:5px 0;
color:#666;
}

.switch-form{
text-align:center;
margin-top:15px;
color:#4CAF50;
cursor:pointer;
}

.switch-form:hover{
text-decoration:underline;
}
</style>
</head>
<body>

<!-- Halaman Login -->
<div id="login">
<h2>Masuk ke Akun</h2>
<input id="loginUser" placeholder="Username kamu" required>
<input id="loginPass" type="password" placeholder="Password kamu" required>
<button onclick="login()">Masuk</button>
<p class="switch-form" onclick="showRegister()">Belum punya akun? Daftar di sini</p>
</div>

<!-- Halaman Daftar -->
<div id="register" class="hidden">
<h2>Daftar Akun Baru</h2>
<input id="regUser" placeholder="Pilih Username" required>
<input id="regPass" type="password" placeholder="Pilih Password" required>
<button onclick="register()">Daftar Sekarang</button>
<p class="switch-form" onclick="showLogin()">Sudah punya akun? Masuk di sini</p>
</div>

<!-- Halaman Utama -->
<div id="home" class="hidden">
<div class="video-box">
<video autoplay muted loop>
<source src="anime.mp4" type="video/mp4">
<p>Browser kamu tidak mendukung video.</p>
</video>
</div>

<h2>Halo, <span id="userName"></span>! 📚</h2>
<button onclick="copyNomor()">Copy Nomor Admin</button>
<button onclick="bukaMenu()">>>> Buka Menu Quiz <<<</button>
<button onclick="logout()">Keluar dari Akun</button>

<div id="menu" class="hidden">
<select id="mapel" required>
<option value="">-- Pilih Mata Pelajaran --</option>
<option value="MTK">MTK</option>
<option value="IPAS">IPAS</option>
<option value="BINDO">Bahasa Indonesia</option>
<option value="SENI">Seni Budaya</option>
<option value="BINGGRIS">Bahasa Inggris</option>
<option value="LAINNYA">Pengetahuan Umum</option>
</select>

<input type="number" id="jumlah" placeholder="Jumlah Soal (Max 100)" min="1" max="100" value="5" required>

<button onclick="mulaiQuiz()">Mulai Kerjakan Soal</button>
<button onclick="resetForm()">Reset Pilihan</button>
</div>
</div>

<!-- Halaman Quiz -->
<div id="quiz" class="hidden">
<h2>Soal <span id="mapelNama"></span></h2>
<button onclick="kembaliHome()">Kembali ke Utama</button>
<div id="soalContainer"></div>
</div>

<script>
// Data Soal (ditambah lagi biar lebih banyak pilihan random)
const soalData = {
MTK:[
"12 + 8 = ?", "15 x 4 = ?", "100 : 5 = ?", "7² = ?", "30% dari 100 = ?",
"25 - 9 = ?", "√144 = ?", "5/100 = berapa % ?", "4 + (3 x 2) = ?", "Volume kubus sisi 5 cm = ?",
"1 jam = berapa detik?", "Lebar persegi panjang 4m, panjang 6m, luasnya = ?", "9 x 9 = ?", "1/2 dari 80 = ?", "50 + 75 = ?",
"200 - 35 = ?", "6³ = ?", "15% dari 200 = ?", "8 : 0.5 = ?", "Keliling lingkaran jari-jari 7cm = ?"
],

IPAS:[
"Apa planet terbesar di Tata Surya?", "Fungsi utama akar tumbuhan?", "Apa itu fotosintesis?", "Sumber energi matahari?", "Nama satelit alami bumi?",
"Zat yang dibutuhkan manusia untuk bernapas?", "Jenis tanah paling gembur?", "Apa itu siklus air?", "Bagian tumbuhan buat makanan?", "Hewan yang bernapas dengan insang?",
"Apa itu oksigen?", "Nama gunung berapi aktif terbesar Indonesia?", "Apa itu gempa bumi?", "Fungsi paru-paru pada hewan?", "Apa itu DNA?",
"Bagian mata yang menangkap cahaya?", "Apa itu zat gizi makro?", "Nama ikan yang bisa hidup di air tawar dan laut?", "Apa itu lapisan ozon?", "Sumber energi terbarukan apa saja?"
],

BINDO:[
"Sinonim kata 'indah'?", "Antonim kata 'besar'?", "Tanda akhir kalimat tanya?", "Apa itu paragraf?", "Fungsi kata kerja?",
"Jenis kalimat yang menyatakan harapan?", "Apa itu kiasan?", "Perbedaan kata benda dan sifat?", "Tanda baca untuk daftar?", "Sinonim kata 'cerdas'?",
"Antonim kata 'cepat'?", "Apa itu alinea?", "Tanda baca seru digunakan untuk?", "Apa itu kata sandang?", "Sinonim kata 'bahagia'?",
"Jenis kalimat yang menyatakan larangan?", "Apa itu majas?", "Perbedaan antara kata kerja dan kata keterangan?", "Tanda baca titik dua digunakan untuk?", "Apa itu puisi?"
],

SENI:[
"Pelukis lukisan Mona Lisa?", "Warna primer seni rupa?", "Definisi musik secara sederhana?", "Fungsi tari dalam masyarakat?", "Perbedaan lukisan dan gambar?",
"Pelukis Indonesia karya 'Musim Kemarau'?", "Apa itu harmoni seni rupa?", "Alat musik dawai umum?", "Apa itu komposisi seni?", "Warna sekunder merah + kuning?",
"Nama tari tradisional Jawa Tengah?", "Apa itu warna komplementer?", "Pelukis terkenal dari Indonesia?", "Apa itu ritme dalam musik?", "Jenis seni pertunjukan apa saja?",
"Apa itu tekstur dalam seni rupa?", "Nama alat musik tiup tradisional?", "Apa itu ekspresi dalam tari?", "Warna sekunder biru + kuning?", "Apa itu instalasi seni?"
],

BINGGRIS:[
"'Apple' artinya?", "'Cat' artinya?", "'Book' artinya?", "'Good Morning' artinya?", "'Water' artinya?",
"'School' artinya?", "'Thank You' artinya?", "'Teacher' artinya?", "'House' artinya?", "'See You Tomorrow' artinya?",
"'Car' artinya?", "'Happy' artinya?", "'Family' artinya?", "'Good Night' artinya?", "'Food' artinya?",
"'Friend' artinya?", "'Sorry' artinya?", "'Study' artinya?", "'Play' artinya?", "'Beautiful' artinya?"
],

LAINNYA:[
"Indonesia merdeka tahun berapa?", "Ibu kota Jepang?", "Warna bendera Indonesia?", "Presiden pertama Indonesia?", "Pulau terbesar Indonesia?",
"Mata uang Indonesia?", "Jumlah provinsi Indonesia saat ini?", "Gunung tertinggi Indonesia?", "Laut sebelah utara Indonesia?", "Penulis lagu 'Indonesia Raya'?",
"Nama selat antara Jawa dan Sumatra?", "Ibu kota Provinsi Riau?", "Tanggal hari kemerdekaan Indonesia?", "Nama negara tetangga Indonesia di sebelah barat?", "Apa itu pancasila?",
"Jumlah sila dalam pancasila?", "Nama sungai terpanjang di Indonesia?", "Apa itu bhineka tunggal ika?", "Nama bandara utama di Pekanbaru?", "Pulau apa yang disebut 'Pulau Dewata'?"
]
};

// Fungsi Tampilkan Login/Daftar
function showLogin(){
document.getElementById("register").classList.add("hidden");
document.getElementById("login").classList.remove("hidden");
}

function showRegister(){
document.getElementById("login").classList.add("hidden");
document.getElementById("register").classList.remove("hidden");
}

// Fungsi Daftar Akun
function register(){
const regUser = document.getElementById("regUser").value.trim();
const regPass = document.getElementById("regPass").value.trim();

if(!regUser || !regPass){
alert("Username dan password tidak boleh kosong!");
return;
}

// Ambil data akun dari localStorage
let users = JSON.parse(localStorage.getItem("users")) || [];

// Cek apakah username sudah ada
const userExist = users.some(user => user.username === regUser);
if(userExist){
alert("Username sudah dipakai teman lain! Pilih yang lain ya.");
return;
}

// Simpan akun baru
users.push({username: regUser, password: regPass});
localStorage.setItem("users", JSON.stringify(users));
alert("Akun berhasil dibuat! Silakan masuk.");
showLogin();
}

// Fungsi Login
function login(){
const loginUser = document.getElementById("loginUser").value.trim();
const loginPass = document.getElementById("loginPass").value.trim();

let users = JSON.parse(localStorage.getItem("users")) || [];
const userFound = users.find(user => user.username === loginUser && user.password === loginPass);

if(userFound){
// Simpan data login aktif
localStorage.setItem("activeUser", JSON.stringify({
username: loginUser,
loginTime: Date.now()
}));

// Tampilkan nama pengguna di halaman utama
document.getElementById("userName").textContent = loginUser;

// Pindah ke halaman utama
document.getElementById("login").classList.add("hidden");
document.getElementById("home").classList.remove("hidden");
alert(`Selamat datang ${loginUser}! Mari belajar bareng yuk.`);
}else{
alert("Username atau password salah, atau akun belum terdaftar!");
}
}

// Cek Login Saat Halaman Dimuat
window.onload = function(){
const activeUser = JSON.parse(localStorage.getItem("activeUser"));
if(activeUser){
const sekarang = Date.now();
const tujuhHari = 7 * 24 * 60 * 60 * 1000;

if(sekarang - activeUser.loginTime < tujuhHari){
document.getElementById("userName").textContent = activeUser.username;
document.getElementById("login").classList.add("hidden");
document.getElementById("home").classList.remove("hidden");
}else{
localStorage.removeItem("activeUser"); // Hapus jika sudah lebih dari 7 hari
}
}
}

// Fungsi Logout
function logout(){
localStorage.removeItem("activeUser");
document.getElementById("home").classList.add("hidden");
document.getElementById("login").classList.remove("hidden");
alert("Berhasil keluar dari akun!");
}

// Fungsi Copy Nomor
function copyNomor(){
navigator.clipboard.writeText("085194654911")
.then(() => alert("Nomor admin berhasil disalin!"))
.catch(() => alert("Gagal menyalin, silakan salin manual ya."));
}

// Fungsi Buka/Tutup Menu
function bukaMenu(){
document.getElementById("menu").classList.toggle("hidden");
}

// Fungsi Reset Form
function resetForm(){
document.getElementById("mapel").value = "";
document.getElementById("jumlah").value = 5;
}

// Fungsi Kembali ke Utama
function kembaliHome(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("home").classList.remove("hidden");
resetForm();
}

// Fungsi Mulai Quiz (Soal Selalu Random Tanpa Duplikat)
function mulaiQuiz(){
const mapel = document.getElementById("mapel").value;
let jumlah = parseInt(document.getElementById("jumlah").value);

// Validasi
if(!mapel){
alert("Pilih mata pelajaran dulu ya!");
return;
}
if(isNaN(jumlah) || jumlah < 1){
alert("Jumlah soal minimal 1!");
document.getElementById("jumlah").value = 5;
return;
}
if(jumlah > 100) jumlah = 100;

// Tampilkan nama mapel
const mapelNama = document.getElementById("mapel").options[document.getElementById("mapel").selectedIndex].text;
document.getElementById("mapelNama").textContent = mapelNama;

// Pindah ke halaman quiz
document.getElementById("home").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");

const container = document.getElementById("soalContainer");
container.innerHTML = "";

const arrSoal = soalData[mapel];
const maxSoal = Math.min(jumlah, arrSoal.length);
const soalTerpilih = [];

// Ambil soal random tanpa duplikat
while(soalTerpilih.length < maxSoal){
const randomIndex = Math.floor(Math.random() * arrSoal.length);
if(!soalTerpilih.includes(arrSoal[randomIndex])){
soalTerpilih.push(arrSoal[randomIndex]);
}
}

// Tampilkan soal
soalTerpilih.forEach((soal, index) => {
container.innerHTML += `<div class="soal">${index+1}. ${soal}</div>`;
});

// Pemberitahuan jika soal tidak cukup
if(jumlah > arrSoal.length){
alert(`Soal untuk ${mapelNama} hanya ada ${arrSoal.length} buah. Sudah tampilkan yang semua ya!`);
}
}
</script>

</body>
</html>
